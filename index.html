<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curriculo Erick</title>
    <meta
      name="description"
      content="Portfolio single-page for recruiter conversion with resume download and contact path."
      data-meta-description
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,300;1,9..144,500&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <nav class="topbar">
        <div class="topbar-brand">
          <a class="brand" href="#hero">
            <span class="brand-prefix">~/</span><span class="brand-name"></span>
          </a>
          <div class="topbar-meta">
            <span class="topbar-kicker" data-site-kicker></span>
            <span class="topbar-location" data-site-location></span>
          </div>
        </div>
        <div class="topbar-nav">
          <a class="nav-link" href="#hero">about</a>
          <a class="nav-link" href="#experience">work</a>
          <a class="nav-link" href="#footer" data-contact-shortcut></a>
        </div>
        <div class="topbar-actions">
          <a class="topbar-cta" data-resume-download target="_blank" rel="noreferrer">
            <span data-cta-primary></span>
          </a>
          <a
            class="topbar-action"
            data-header-linkedin
            target="_blank"
            rel="noreferrer"
            aria-label="LinkedIn"
            title="LinkedIn"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6.94 8.5A1.56 1.56 0 1 1 6.94 5.4a1.56 1.56 0 0 1 0 3.1ZM5.56 9.69h2.77V18H5.56V9.69Zm4.5 0H12.7v1.13h.04c.37-.7 1.28-1.43 2.64-1.43 2.83 0 3.35 1.78 3.35 4.09V18h-2.77v-4.02c0-.96-.02-2.19-1.4-2.19-1.4 0-1.61 1.04-1.61 2.12V18h-2.77V9.69Z"
                fill="currentColor"
              />
            </svg>
          </a>
          <a class="topbar-action" data-header-email aria-label="Email" title="Email">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 6.5h16A1.5 1.5 0 0 1 21.5 8v8A1.5 1.5 0 0 1 20 17.5H4A1.5 1.5 0 0 1 2.5 16V8A1.5 1.5 0 0 1 4 6.5Zm0 1.5v.2l8 5.1 8-5.1V8H4Zm16 8V9.98l-7.6 4.84a.75.75 0 0 1-.8 0L4 9.98V16h16Z"
                fill="currentColor"
              />
            </svg>
          </a>
          <button
            type="button"
            class="topbar-action"
            data-share-page
            aria-label="Compartilhar página"
            title="Compartilhar página"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15.7 4.5a2.8 2.8 0 1 1-.01 5.61 2.8 2.8 0 0 1 .01-5.6ZM7.3 10.2a2.8 2.8 0 1 1-.01 5.61 2.8 2.8 0 0 1 .01-5.6Zm8.4 3.7a2.8 2.8 0 1 1-.01 5.61 2.8 2.8 0 0 1 .01-5.6ZM9.7 12.3l3.62-2.06-.74-1.3-3.62 2.06.74 1.3Zm3.62 2.76-3.62-2.06-.74 1.3 3.62 2.06.74-1.3Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </nav>

      <div class="bento-grid">
        <section class="hero bento-card bento-hero" id="hero">
          <p class="availability-pill" data-hero-availability></p>
          <span data-hero-headline style="display:none"></span>
          <h1>
            <span class="name-first"></span>
            <span class="name-last"></span>
          </h1>

          <p class="hero-summary" data-hero-summary></p>

          <div class="hero-lower">
            <div class="positioning-block">
              <p class="micro-label" data-hero-card-label></p>
              <p class="positioning-title" data-hero-card-title></p>
              <p class="positioning-body" data-hero-card-body></p>
              <div class="hero-tags" data-hero-tags></div>
              <dl class="hero-highlights" data-hero-highlights></dl>
            </div>

          </div>
        </section>

        <section class="description-block bento-card bento-description" id="about">
          <p class="section-label" data-about-kicker></p>
          <h2 class="section-title" data-about-title></h2>
          <p class="description-copy" data-about-body></p>
          <div class="about-metrics">
            <p class="micro-label" data-metrics-kicker></p>
            <h3 class="section-title section-title-sm" data-metrics-title></h3>
            <div class="metrics-inline" data-metrics-list></div>
          </div>
        </section>

        <section class="ph-card bento-card bento-skills" id="skills">
          <p class="section-label" data-skills-kicker></p>
          <h2 class="section-title section-title-sm" data-skills-title></h2>
          <div data-skills-list></div>
        </section>

        <section class="ph-card bento-card bento-experience" id="experience">
          <p class="section-label" data-experience-kicker></p>
          <h2 class="section-title section-title-sm" data-experience-title></h2>
          <div data-experience-list></div>
        </section>

        <footer class="ph-footer bento-card bento-contact" id="footer">
          <div class="footer-copy">
          <p class="section-label" data-contact-kicker></p>
          <h2 class="section-title section-title-sm" data-contact-title></h2>
          <p class="footer-body" data-contact-body></p>
          </div>
          <div data-contact-links></div>
        </footer>
      </div>
    </div>

    <script>
      (function renderPortfolio() {
        const state = {
          language: portfolioConfig.i18n.defaultLanguage,
        };

        const query = (selector) => document.querySelector(selector);
        const queryAll = (selector) => Array.from(document.querySelectorAll(selector));

        const content = () => portfolioConfig.i18n.languages[state.language];
        const site = () => portfolioConfig.site;
        const cta = () => portfolioConfig.cta;

        function renderHighlights(items) {
          const root = query("[data-hero-highlights]");
          root.innerHTML = items
            .map(
              (item) => `
                <div class="proof-item">
                  <dt>${item.value}</dt>
                  <dd>${item.label}</dd>
                </div>
              `
            )
            .join("");
        }

        function renderHeroTags(items) {
          const root = query("[data-hero-tags]");
          root.innerHTML = items.map((item) => `<span>${item}</span>`).join("");
        }

        function renderSkills(groups) {
          const root = query("[data-skills-list]");
          root.innerHTML = groups
            .map(
              (group) => `
                <article class="skill-card">
                  <p class="skill-label">${group.label}</p>
                  <ul>
                    ${group.items.map((item) => `<li>${item}</li>`).join("")}
                  </ul>
                </article>
              `
            )
            .join("");
        }

        function renderExperience(items) {
          const root = query("[data-experience-list]");
          root.innerHTML = items
            .map(
              (item) => `
                <article class="timeline-item">
                  <div class="timeline-meta">
                    <span class="mono-chip">${item.period}</span>
                    <span>${item.location}</span>
                  </div>
                  <h3>${item.role}</h3>
                  <p class="timeline-company">${item.company}</p>
                  <p>${item.summary}</p>
                </article>
              `
            )
            .join("");
        }

        function renderMetrics(items) {
          const root = query("[data-metrics-list]");
          root.innerHTML = items
            .map(
              (item) => `
                <article class="metric-card">
                  <p class="metric-value">${item.value}</p>
                  <p class="metric-label">${item.label}</p>
                </article>
              `
            )
            .join("");
        }

        function renderContactLinks(items) {
          const root = query("[data-contact-links]");
          root.innerHTML = items
            .map(
              (item) => `
                <a class="contact-link" href="${item.href}" target="${item.external ? "_blank" : "_self"}" rel="${item.external ? "noreferrer" : ""}">
                  <span>${item.label}</span>
                  <strong>${item.value}</strong>
                </a>
              `
            )
            .join("");
        }

        function applyText(bindings) {
          Object.entries(bindings).forEach(([selector, value]) => {
            const node = query(selector);
            if (node) node.textContent = value;
          });
        }

        function renderLanguage() {
          const lang = content();
          const [firstName, ...restName] = lang.hero.headline.trim().split(/\s+/);
          const lastName = restName.join(" ");
          const brandName = `${lang.hero.headline
            .trim()
            .toLowerCase()
            .replace(/\s+/g, "-")}.dev`;

          document.documentElement.lang = state.language === "pt-BR" ? "pt-BR" : "en";
          document.title = `${site().title} | ${lang.hero.headline}`;
          query("[data-meta-description]").setAttribute("content", lang.hero.summary);

          applyText({
            "[data-site-kicker]": site().kicker,
            "[data-site-location]": site().location,
            "[data-contact-shortcut]": lang.cta.contactShort,
            "[data-hero-availability]": lang.hero.availability,
            "[data-hero-headline]": lang.hero.headline,
            "[data-hero-summary]": lang.hero.summary,
            "[data-cta-primary]": lang.cta.resume,
            "[data-contact-cta]": lang.cta.contact,
            "[data-hero-card-label]": lang.hero.card.label,
            "[data-hero-card-title]": lang.hero.card.title,
            "[data-hero-card-body]": lang.hero.card.body,
            "[data-about-kicker]": lang.about.kicker,
            "[data-about-title]": lang.about.title,
            "[data-about-body]": lang.about.body,
            "[data-skills-kicker]": lang.skills.kicker,
            "[data-skills-title]": lang.skills.title,
            "[data-experience-kicker]": lang.experience.kicker,
            "[data-experience-title]": lang.experience.title,
            "[data-metrics-kicker]": lang.metrics.kicker,
            "[data-metrics-title]": lang.metrics.title,
            "[data-contact-kicker]": lang.contact.kicker,
            "[data-contact-title]": lang.contact.title,
            "[data-contact-body]": lang.contact.body,
          });

          query(".name-first").textContent = firstName || "";
          query(".name-last").textContent = lastName || "";
          query(".brand-name").textContent = brandName;

          const downloadLink = query("[data-resume-download]");
          downloadLink.href = cta().resumeUrl;
          downloadLink.setAttribute("aria-label", lang.cta.resume);

          const linkedinLink = query("[data-header-linkedin]");
          linkedinLink.href = portfolioConfig.contact.linkedin;
          linkedinLink.setAttribute("aria-label", "LinkedIn");

          const emailLink = query("[data-header-email]");
          emailLink.href = `mailto:${portfolioConfig.contact.email}`;
          emailLink.setAttribute("aria-label", portfolioConfig.contact.email);

          renderHighlights(lang.hero.highlights);
          renderHeroTags(lang.hero.card.tags);
          renderSkills(lang.skills.groups);
          renderExperience(lang.experience.items);
          renderMetrics(lang.metrics.items);
          renderContactLinks(lang.contact.links);

          queryAll("[data-language-button]").forEach((button) => {
            const isActive = button.dataset.languageButton === state.language;
            button.dataset.active = isActive ? "true" : "false";
            button.setAttribute("aria-pressed", isActive ? "true" : "false");
          });
        }

        function installLanguageToggle() {
          const toggle = document.createElement("div");
          toggle.className = "language-toggle";
          toggle.innerHTML = portfolioConfig.i18n.supportedLanguages
            .map(
              (language) => `
                <button
                  type="button"
                  class="language-button"
                  data-language-button="${language.code}"
                  aria-pressed="false"
                >
                  ${language.label}
                </button>
              `
            )
            .join("");

          query(".topbar-actions").appendChild(toggle);

          toggle.addEventListener("click", (event) => {
            const button = event.target.closest("[data-language-button]");
            if (!button) return;
            state.language = button.dataset.languageButton;
            renderLanguage();
          });
        }

        function installShareButton() {
          const shareButton = query("[data-share-page]");

          shareButton.addEventListener("click", async () => {
            const shareData = {
              title: document.title,
              text: document.querySelector("[data-meta-description]").getAttribute("content"),
              url: window.location.href,
            };

            try {
              if (navigator.share) {
                await navigator.share(shareData);
                return;
              }

              await navigator.clipboard.writeText(shareData.url);
              shareButton.textContent = "Copied";
              setTimeout(() => {
                shareButton.textContent = "Share";
              }, 1200);
            } catch {
              shareButton.textContent = "Share";
            }
          });
        }

        installLanguageToggle();
        installShareButton();
        renderLanguage();
      })();
    </script>
  </body>
</html>
