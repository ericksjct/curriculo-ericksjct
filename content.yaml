    body: "Engenheiro Físico pela USP com trajetória no Itaú Unibanco e Sicoob COCRED, atuando em Analytics, FP&A e Controladoria. Especialista em automação de processos financeiros críticos e na tradução de grandes volumes de dados em insights estratégicos para liderança executiva. Histórico comprovado de redução de esforço operacional em até 92%, convertendo rotinas de 48h em 4h mensais por meio de soluções escaláveis em Python, SQL e AWS. Atua na interseção entre dados, tecnologia e negócio, suportando decisões em carteiras superiores a R$ 450 bilhões."
